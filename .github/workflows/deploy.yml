name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to stage.taxibox.com.au
    runs-on: self-hosted

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Load nvm and set Node version
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22
          echo "$NVM_BIN" >> $GITHUB_PATH

      - name: Pull latest code
        run: |
          if [ -d /var/www/mike ]; then
            cd /var/www/mike && git pull origin main
          else
            sudo git clone https://github.com/taxibox/mike.git /var/www/mike
            sudo chown -R $USER:$USER /var/www/mike
          fi

      - name: Install dependencies
        run: |
          npm install --prefix /var/www/mike/backend
          npm install --prefix /var/www/mike/frontend

      - name: Build
        run: |
          npm run build --prefix /var/www/mike/backend
          npm run build --prefix /var/www/mike/frontend

      - name: Restart services
        run: |
          sudo -u ubuntu pm2 restart mike-backend mike-frontend 2>/dev/null || sudo -u ubuntu pm2 start /var/www/mike/ecosystem.config.cjs
