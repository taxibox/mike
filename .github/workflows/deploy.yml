name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to stage.taxibox.com.au
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /opt/mike
          git pull origin main

      - name: Install dependencies
        run: |
          npm install --prefix /opt/mike/backend
          npm install --prefix /opt/mike/frontend

      - name: Build
        run: |
          npm run build --prefix /opt/mike/backend
          npm run build --prefix /opt/mike/frontend

      - name: Restart services
        run: pm2 restart mike-backend mike-frontend
