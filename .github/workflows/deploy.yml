name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to stage.taxibox.com.au
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          if [ -d /opt/mike ]; then
            cd /opt/mike && git pull origin main
          else
            sudo git clone https://github.com/taxibox/mike.git /opt/mike
            sudo chown -R $USER:$USER /opt/mike
          fi

      - name: Install dependencies
        run: |
          npm install --prefix /opt/mike/backend
          npm install --prefix /opt/mike/frontend

      - name: Build
        run: |
          npm run build --prefix /opt/mike/backend
          npm run build --prefix /opt/mike/frontend

      - name: Restart services
        run: |
          cd /opt/mike
          pm2 restart mike-backend mike-frontend 2>/dev/null || pm2 start ecosystem.config.cjs
